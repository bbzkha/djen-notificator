name: DJEN Notificator

on:
  # Roda todo dia as 08:00 BRT (UTC-3 = 11:00 UTC)
  schedule:
    - cron: "0 11 * * *"

  # Disparo manual pela aba Actions do repositorio
  workflow_dispatch:
    inputs:
      data:
        description: "Data de busca (YYYY-MM-DD). Deixe vazio para usar hoje."
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notificar:
    name: Consultar DJEN e notificar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Executar notificador
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -n "${{ inputs.data }}" ]; then
            python main.py --data "${{ inputs.data }}"
          else
            python main.py
          fi
